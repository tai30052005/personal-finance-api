spring:
  application:
    name: personal-finance-api

  # ===== Kết nối cơ sở dữ liệu (PostgreSQL) =====
  # Dùng biến môi trường với giá trị mặc định (localhost) để chạy local;
  # khi chạy bằng Docker Compose (Bước 2) các biến này sẽ được override.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finance}
    username: ${DB_USER:finance}
    password: ${DB_PASSWORD:finance}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate': Hibernate chỉ kiểm tra entity khớp với schema, KHÔNG tự sửa bảng.
      # Việc tạo/đổi bảng do Flyway đảm nhiệm (an toàn cho môi trường thật).
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false   # tắt anti-pattern OSIV để tránh giữ session quá lâu

  # ===== Flyway: tự chạy các script migration trong db/migration khi khởi động =====
  flyway:
    enabled: true
    locations: classpath:db/migration

# ===== Cấu hình ứng dụng (JWT) — sẽ dùng ở Bước 4 =====
app:
  jwt:
    # CHỈ DÙNG CHO DEV. Production phải đặt qua biến môi trường JWT_SECRET.
    # Khóa cần đủ dài (>= 32 ký tự) cho thuật toán HMAC-SHA256.
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
    # Thời hạn token: 24 giờ (tính bằng mili-giây)
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  # ===== CORS =====
  # Danh sách origin frontend được phép gọi API (ngăn cách bởi dấu phẩy).
  # Mặc định: các origin localhost (dev). Khi DEPLOY, đặt biến môi trường
  # CORS_ALLOWED_ORIGINS = domain frontend, vd: https://your-app.vercel.app
  # (có thể dùng wildcard: https://*.vercel.app để bao cả bản preview).
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

  # ===== AI (Google Gemini) — nhập giao dịch bằng ngôn ngữ tự nhiên =====
  # Để trống api-key thì tính năng tự tắt (frontend ẩn ô nhập nhanh).
  # Lấy key miễn phí ở https://aistudio.google.com — KHÔNG commit key vào repo.
  ai:
    api-key: ${GEMINI_API_KEY:}
    # flash-lite: nhanh/rẻ, đủ cho trích xuất, và quota free cao hơn gemini-2.5-flash
    # (model đó chỉ 20 request/ngày trên tài khoản này). KHÔNG dùng gemini-2.0-flash (limit 0).
    model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

# ===== Swagger / OpenAPI =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  # Render/Heroku... cấp cổng qua biến môi trường PORT; local mặc định 8080.
  port: ${PORT:8080}
