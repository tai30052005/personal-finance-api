name: CI

# Chạy mỗi khi push hoặc mở pull request vào main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Backend: build + chạy toàn bộ test (H2 in-memory, không cần DB thật) ---
  backend:
    name: Backend (Java 17 · mvn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven   # cache ~/.m2 để lần sau nhanh hơn

      - name: Run tests
        run: mvn -B test

  # --- Frontend: cài dependencies + build production (Vite) ---
  frontend:
    name: Frontend (Node 20 · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
